{% extends "base.html" %}
{% block title %}Đăng ký | AI Academy VN{% endblock %}
{% block content %}
<section class="auth-wrap panel">
    <h1>Đăng ký tài khoản</h1>
    <p class="meta">Tạo tài khoản thành viên để đăng ký khóa học và sử dụng ví tiền.</p>
    <form method="post" class="auth-form">
        <label for="full_name">Họ và tên</label>
        <input id="full_name" type="text" name="full_name" minlength="2" required value="{{ form.full_name }}">

        <label for="username">Username</label>
        <input id="username" type="text" name="username" pattern="[a-z0-9_]{3,30}" required value="{{ form.username }}" placeholder="vd: bachsykhang">
        <p class="meta">Chỉ dùng chữ thường, số, dấu gạch dưới. Độ dài 3-30 ký tự.</p>

        <label for="email">Email</label>
        <input id="email" type="email" name="email" required value="{{ form.email }}">

        <label for="password">Mật khẩu</label>
        <input id="password" type="password" name="password" minlength="6" required>

        <button class="button" type="submit">Tạo tài khoản</button>
    </form>
    <p class="meta">Đã có tài khoản? <a class="text-link" href="{{ url_for('login') }}">Đăng nhập</a></p>
</section>
{% endblock %}
