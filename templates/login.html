{% extends "base.html" %}
{% block title %}Đăng nhập | AI Academy VN{% endblock %}
{% block content %}
<section class="auth-wrap panel">
    <h1>Đăng nhập</h1>
    <p class="meta">Dùng tài khoản của bạn để truy cập ví và khóa học.</p>
    <form method="post" class="auth-form">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required value="{{ form.email }}">

        <label for="password">Mật khẩu</label>
        <input id="password" type="password" name="password" required>

        <button class="button" type="submit">Đăng nhập</button>
    </form>
    <p class="meta">Chưa có tài khoản? <a class="text-link" href="{{ url_for('register') }}">Đăng ký ngay</a></p>
</section>
{% endblock %}
